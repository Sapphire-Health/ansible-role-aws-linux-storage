- name: Add tags to all tasks
  tags:
    - always
  block:
    - name: Make sure storage_layout variable is defined
      ansible.builtin.fail:
        msg: "storage_layout variable is not defined. Please define it in host_vars."
      when: storage_layout is not defined

    - name: Get volume name to id mapping
      ansible.builtin.set_fact:
        aws_linux_storage_vol_name_to_path: "{{ aws_linux_storage_vol_name_to_path | default({}) | combine({item.tags.ansible_key: volpath}) }}"
      vars:
        volpath: "/dev/disk/by-id/nvme-Amazon_Elastic_Block_Store_{{ item.id | replace('-', '') }}"
      delegate_to: localhost
      when: item.tags.ansible_key is defined
      loop: "{{ aws_linux_storage_ec2_vol_info.volumes }}"

    - name: Get volume name to id mapping
      ansible.builtin.debug:
        msg: "{{ aws_linux_storage_vol_name_to_path }}"
      delegate_to: localhost

    - name: Get storage pools to path list mapping
      changed_when: false
      ansible.utils.update_fact:
        updates:
          - path: "storage_layout[{{ storage_pool_index }}].disks"
            value: >-
              {%- set disks = [] -%}
                {%- for disk in storage_pool.disks -%}
                {%- set disks = disks.append(aws_linux_storage_vol_name_to_path[disk]) -%}
              {%- endfor -%}
              {{ disks }}
      delegate_to: localhost
      loop: "{{ storage_layout }}"
      loop_control:
        loop_var: storage_pool
        index_var: storage_pool_index
      register: aws_linux_storage_updated

    # - name: Show storage layout
    #   ansible.builtin.debug:
    #     msg: "{{ aws_linux_storage_updated.results[-1].storage_layout }}"
    #   delegate_to: localhost

    - name: Set storage pools to match modified storage layout from vars
      ansible.builtin.set_fact:
        storage_pools: "{{ aws_linux_storage_updated.results[-1].storage_layout }}"
      delegate_to: localhost # noqa: var-naming[no-role-prefix]

    - name: Show storage layout
      ansible.builtin.debug:
        msg: "{{ storage_pools }}"
      delegate_to: localhost

    - name: Provision Storage
      become: true
      block:
        - name: Install dependencies
          ansible.builtin.dnf:
            name: "{{ item }}"
            state: present
          loop:
            - lvm2
        - name: Provision storage
          ansible.builtin.include_role:
            name: linux-system-roles.storage
